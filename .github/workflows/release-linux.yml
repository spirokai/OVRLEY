name: Release Linux Experimental

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build linux experimental
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="$(git tag --points-at HEAD --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' | head -n 1 || true)"
          if [ -z "$TAG" ]; then
            echo "No semantic-release tag points at the selected commit." >&2
            exit 1
          fi
          echo "commit=$(git rev-parse HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list || true
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list.d/ubuntu.sources || true
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' /etc/apt/apt-mirrors.txt || true
          sudo apt-get clean
          sudo apt-get update \
            -o Acquire::Retries=5 \
            -o Acquire::http::Timeout=30 \
            -o Acquire::https::Timeout=30
          sudo apt-get install -y --no-install-recommends \
            -o Acquire::Retries=5 \
            -o Acquire::http::Timeout=30 \
            -o Acquire::https::Timeout=30 \
            build-essential \
            curl \
            dpkg-dev \
            fakeroot \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version
        run: |
          node -e "const fs=require('fs');const version=process.env.RELEASE_VERSION;for (const file of ['package.json','src-tauri/tauri.conf.json']) { const json=JSON.parse(fs.readFileSync(file,'utf8')); json.version=version; fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n'); }"
        env:
          RELEASE_VERSION: ${{ steps.release_tag.outputs.version }}

      - name: Verify bundled FFmpeg resource tree
        shell: bash
        run: |
          set -euo pipefail
          test -x vendor/ffmpeg/bin/ffmpeg
          test -x vendor/ffmpeg/bin/ffprobe

      - name: Normalize FFmpeg libs for Tauri bundler
        shell: bash
        run: |
          set -euo pipefail

          cd vendor/ffmpeg/lib
          for full in *.so.*.*.*; do
            [ -e "$full" ] || continue
            soname="${full%.*.*}"
            unversioned="${soname%.*}"
            rm -f "$soname" "$unversioned"
            ln "$full" "$soname"
          done
          cd -

          remaining="$(find vendor/ffmpeg/lib -maxdepth 1 -type l -print)"
          if [ -n "$remaining" ]; then
            echo "$remaining"
            exit 1
          fi
          ls -li vendor/ffmpeg/lib/*.so*
          LD_LIBRARY_PATH="$PWD/vendor/ffmpeg/lib" vendor/ffmpeg/bin/ffmpeg -version

      - name: Build Tauri Debian package
        run: pnpm tauri build --bundles deb

      - name: Verify Debian package contains bundled FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          DEB="$(find src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)"
          if [ -z "$DEB" ]; then
            echo "No .deb package was produced." >&2
            exit 1
          fi
          dpkg-deb -c "$DEB" | grep -E '/vendor/ffmpeg/bin/ffmpeg$'
          dpkg-deb -c "$DEB" | grep -E '/vendor/ffmpeg/bin/ffprobe$'

      - name: Normalize release artifact name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release
          DEB="$(find src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)"
          if [ -z "$DEB" ]; then
            echo "No .deb package was produced." >&2
            exit 1
          fi
          cp "$DEB" "dist-release/OVRLEY-linux-${{ steps.release_tag.outputs.version }}.deb"

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            dist-release/*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
