name: Release Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="$(git tag --points-at HEAD --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' | head -n 1 || true)"
          if [ -z "$TAG" ]; then
            echo "No semantic-release tag points at the selected branch tip." >&2
            exit 1
          fi
          echo "commit=$(git rev-parse HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Disable Tauri bundling
        run: node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));c.bundle.targets=[];fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null,2))"

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Create portable archive
        run: node scripts/package-portable.mjs --version ${{ steps.release_tag.outputs.tag }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            dist-portable/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
