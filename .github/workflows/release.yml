name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            bundles: nsis,msi
            artifact_glob: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
              dist-portable/*.zip
          - name: macos
            os: macos-latest
            bundles: dmg
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
              dist-portable/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="$(git tag --merged HEAD --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' | head -n 1)"
          if [ -z "$TAG" ]; then
            echo "No semantic-release tag found on the selected branch history." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git checkout "refs/tags/$TAG"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Create Windows portable archive
        if: runner.os == 'Windows'
        run: node scripts/package-portable.mjs --version ${{ steps.release_tag.outputs.tag }}

      - name: Create macOS portable archive
        if: runner.os == 'macOS'
        run: node scripts/package-portable.mjs --version ${{ steps.release_tag.outputs.tag }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
