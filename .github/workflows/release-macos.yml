name: Release macOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macos
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="$(git tag --merged HEAD --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' | head -n 1)"
          if [ -z "$TAG" ]; then
            echo "No semantic-release tag found on the selected branch history." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git checkout "refs/tags/$TAG"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --bundles app

      - name: Create portable archive
        run: node scripts/package-portable.mjs --version ${{ steps.release_tag.outputs.tag }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            dist-portable/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
